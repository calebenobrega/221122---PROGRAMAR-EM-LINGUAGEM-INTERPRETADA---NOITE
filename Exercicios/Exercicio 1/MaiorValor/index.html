<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        let numbers = [10, 25, 3, 78, 5];

        let maior = numbers[0];

        for (let i = 1; i < numbers.length; i++) {
            if (numbers[i] > maior) {
                maior = numbers[i];
            }
        }
        console.log("O maior valor é: " + maior);
    </script>
    
</body>
</html>
