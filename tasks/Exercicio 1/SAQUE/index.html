<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAQUE</title>
</head>
<body>

    <script>

        const conta = {
            nome: "Calebe",
            saldo: 1000
        };
        
        console.log("Nome do cliente: " + conta.nome + "\nSaldo atual: R$" + conta.saldo );

        let saque = 2000;

        if (saque > conta.saldo) {
            console.log("Saldo insuficiente para o saque de R$" + saque);
        } else {
            conta.saldo -= saque;
            console.log("Saque de R$" + saque + " realizado com sucesso.");
            console.log("Saldo restante: R$" + conta.saldo);
        }
    </script>

</body>
</html>
