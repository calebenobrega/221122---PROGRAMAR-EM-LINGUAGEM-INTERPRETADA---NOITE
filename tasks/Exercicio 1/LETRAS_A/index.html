<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

    <script>

        const frase = "Olá, Meu Nome é Calebe e qual é o seu nome?";
        let ContadorDeA = 0;
        for (let i = 0; i < frase.length; i++) {
            if (frase[i].toLowerCase() === 'a') {
                ContadorDeA++;
            }
        }
        console.log( frase + "\n A letra 'a' aparece " + ContadorDeA + " vezes na frase.\na letra 'a' com acento nao aparece na frase.");
        
        


    </script>
    
</body>
</html>
